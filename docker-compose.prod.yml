services:
  db:
    image: postgres:16
    container_name: hub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - hub_db_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: hub-web
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "127.0.0.1:8899:8000"
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.hub.rule=Host(`hubsweida.jwtalenthouse.com`)"
      - "traefik.http.routers.hub.entrypoints=web"
      - "traefik.http.services.hub.loadbalancer.server.port=8000"
      - "traefik.http.routers.hub-secure.rule=Host(`hubsweida.jwtalenthouse.com`)"
      - "traefik.http.routers.hub-secure.entrypoints=websecure"
      - "traefik.http.routers.hub-secure.tls=true"
      - "traefik.http.routers.hub-secure.tls.certresolver=letsencrypt"

volumes:
  hub_db_data:

networks:
  proxy:
    external: true
