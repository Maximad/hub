{% extends "base.html" %}
{% block content %}<h2>شريك جديد</h2>{% if error %}<p>{{ error }}</p>{% endif %}{% if errors %}{% for msg in errors.values %}<p style="color:#b91c1c;">{{ msg }}</p>{% endfor %}{% endif %}
<form method="post">{% csrf_token %}<input name="name_ar" value="{{ form_values.name_ar|default:'' }}" required placeholder="الاسم"><input name="name_en" value="{{ form_values.name_en|default:'' }}" placeholder="EN"><input name="contact_person" value="{{ form_values.contact_person|default:'' }}" placeholder="جهة الاتصال"><input name="phone" value="{{ form_values.phone|default:'' }}" placeholder="الهاتف"><select name="vendor_type">{% for v,l in types %}<option value="{{ v }}" {% if form_values.vendor_type == v %}selected{% endif %}>{{ l }}</option>{% endfor %}</select><textarea name="settlement_notes">{{ form_values.settlement_notes|default:'' }}</textarea><label><input type="checkbox" name="is_active" {% if form_values.is_active|default:True %}checked{% endif %}>نشط</label><button>حفظ</button></form>{% endblock %}
