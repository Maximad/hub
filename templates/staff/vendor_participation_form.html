{% extends 'base.html' %}
{% block content %}<h2>مشاركة للشريك: {{ vendor.name_ar }}</h2>
<form method="post">{% csrf_token %}<input name="title_ar" placeholder="عنوان المشاركة"><input type="datetime-local" name="starts_at" required><input type="datetime-local" name="ends_at"><select name="event"><option value="">الفعالية (اختياري)</option>{% for e in events %}<option value="{{ e.id }}">{{ e.title_ar }}</option>{% endfor %}</select><select name="location_area"><option value="">الموقع</option>{% for a in areas %}<option value="{{ a.id }}">{{ a.name_ar }}</option>{% endfor %}</select><select name="status">{% for v,l in statuses %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select><textarea name="notes"></textarea><button>حفظ</button></form>{% endblock %}
