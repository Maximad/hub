{% extends "base.html" %}
{% block content %}<h2>مشاركة جديدة: {{ vendor.name_ar }}</h2>{% if error %}<p>{{ error }}</p>{% endif %}
<form method="post">{% csrf_token %}<input name="title_ar" value="{{ form_data.title_ar|default:'' }}" placeholder="عنوان المشاركة"><input type="datetime-local" name="starts_at" value="{{ form_data.starts_at|default:'' }}" required><input type="datetime-local" name="ends_at" value="{{ form_data.ends_at|default:'' }}"><select name="location_area"><option value="">الموقع</option>{% for a in areas %}<option value="{{ a.id }}" {% if form_data.location_area == a.id|stringformat:'s' %}selected{% endif %}>{{ a.name_ar }}</option>{% endfor %}</select><select name="status">{% for v,l in statuses %}<option value="{{ v }}" {% if form_data.status == v %}selected{% endif %}>{{ l }}</option>{% endfor %}</select><textarea name="notes">{{ form_data.notes|default:'' }}</textarea><button>حفظ</button></form>{% endblock %}
