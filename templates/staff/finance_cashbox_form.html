{% extends "base.html" %}{% block title %}حركة صندوق{% endblock %}{% block content %}<h2>حركة صندوق جديدة</h2>{% for e in errors %}<div class="hub-message hub-message-error">{{ e }}</div>{% endfor %}<form method="post" class="hub-form">{% csrf_token %}<label>تاريخ العمل<input class="hub-input" type="date" name="business_date" value="{{ today|date:'Y-m-d' }}"></label><label>نوع الحركة<select name="movement_type">{% for v,l in types %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></label><label>الاتجاه<select name="direction">{% for v,l in directions %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></label><label>المبلغ<input class="hub-input" type="number" min="1" name="amount_syp" required></label><label>العنوان<input class="hub-input" name="title" required></label><label>المورد<select name="vendor"><option value="">—</option>{% for v in vendors %}<option value="{{ v.id }}">{{ v }}</option>{% endfor %}</select></label><label>مصروف مرتبط<select name="related_expense"><option value="">—</option>{% for e in expenses %}<option value="{{ e.id }}">{{ e }}</option>{% endfor %}</select></label><label>سبب التصحيح / ملاحظات<textarea class="hub-input" name="notes"></textarea></label><button class="hub-button hub-button-primary">حفظ</button></form>{% endblock %}
