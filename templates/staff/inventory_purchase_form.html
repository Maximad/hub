{% extends "staff/inventory_base.html" %}{% block inventory_content %}<form method="post">{% csrf_token %}<p><label>التاريخ <input type="date" name="business_date" value="{{ today|date:'Y-m-d' }}"></label> <label>المورد <select name="vendor"><option value="">—</option>{% for v in vendors %}<option value="{{ v.pk }}">{{ v }}</option>{% endfor %}</select></label> <label>مورد نصي <input name="supplier_name"></label></p><p><label>رقم الفاتورة <input name="invoice_number"></label> <label>الحالة <select name="status">{% for v,l in statuses %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></label> <label>طريقة الدفع <select name="payment_method">{% for v,l in methods %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></label> <label>مدفوع من <select name="paid_from">{% for v,l in paid_froms %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></label></p><h3>بنود الشراء</h3>{% for n in '12345' %}<p><select name="inventory_item"><option value="">—</option>{% for i in items %}<option value="{{ i.pk }}">{{ i }}</option>{% endfor %}</select> <input type="number" step="0.001" name="quantity" placeholder="الكمية"> <input type="number" step="0.01" name="unit_cost_syp" placeholder="كلفة الوحدة"></p>{% endfor %}<p><label>خصم <input type="number" step="0.01" name="discount_syp" value="0"></label> <label>المبلغ المدفوع <input type="number" step="0.01" name="amount_paid_syp" value="0"></label></p><p><textarea name="notes" placeholder="ملاحظات"></textarea></p><button class="hub-button">حفظ</button></form>{% endblock %}
