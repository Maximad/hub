{% extends "base.html" %}
{% block title %}تعيين كلمة المرور{% endblock %}
{% block content %}
<section class="hub-section hub-card">
  <div class="hub-toolbar"><a class="hub-button hub-button-secondary" href="{% url 'staff_user_detail' target_user.id %}">العودة للمستخدم</a></div>
  <h2>تعيين كلمة مرور: {{ target_user.username }}</h2>
  <form method="post" class="hub-form">{% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}<label>{{ field.label }}{{ field }}{% for error in field.errors %}<small class="hub-error">{{ error }}</small>{% endfor %}</label>{% endfor %}
    <button class="hub-button hub-button-primary" type="submit">حفظ كلمة المرور</button>
  </form>
</section>
{% endblock %}
