{% extends "base.html" %}
{% block title %}طباعة روابط الطاولات{% endblock %}
{% block content %}
<style>
@media print {
  header { display: none; }
  main { max-width: 100%; box-shadow: none; }
}
.grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 0.75rem; }
.card { border:1px solid #444; border-radius:8px; padding:0.75rem; }
</style>
<h2>نسخة طباعة روابط الطاولات</h2>
<p><button type="button" onclick="window.print()">طباعة الآن</button></p>
<div class="grid">
  {% for row in rows %}
  <div class="card">
    <div><strong>{{ row.table.name_ar }}</strong></div>
    <div>الغرفة: {{ row.table.room.name_ar|default:"—" }}</div>
    <div style="font-size:0.9rem; word-break:break-all; direction:ltr;">{{ row.full_url }}</div>
  </div>
  {% endfor %}
</div>
{% endblock %}
