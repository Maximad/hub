{% extends "base.html" %}{% block title %}مصروف جديد{% endblock %}{% block content %}<h2>مصروف جديد</h2>{% for e in errors %}<div class="hub-message hub-message-error">{{ e }}</div>{% endfor %}<form method="post" class="hub-form">{% csrf_token %}<label>تاريخ العمل<input class="hub-input" type="date" name="business_date" value="{{ form_values.business_date|default:today|date:'Y-m-d' }}"></label><label>تصنيف المصروف<select name="category" required>{% for c in categories %}<option value="{{ c.id }}">{{ c }}</option>{% endfor %}</select></label><label>العنوان<input class="hub-input" name="title" required></label><label>المبلغ<input class="hub-input" type="number" min="1" name="amount_syp" required></label><label>المورد<select name="vendor"><option value="">—</option>{% for v in vendors %}<option value="{{ v.id }}">{{ v }}</option>{% endfor %}</select></label><label>اسم مورد بديل<input class="hub-input" name="supplier_name"></label><label>طريقة الدفع<select name="payment_method"><option value="">—</option>{% for v,l in methods %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></label><label>مدفوع من<select name="paid_from">{% for v,l in paid_froms %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></label><label>الحالة<select name="status">{% for v,l in statuses %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></label><label>رقم الفاتورة<input class="hub-input" name="receipt_number"></label><label>إيصال<select name="receipt_media"><option value="">—</option>{% for m in media_assets %}<option value="{{ m.id }}">{{ m }}</option>{% endfor %}</select></label><label>ملاحظات<textarea class="hub-input" name="description"></textarea></label><button class="hub-button hub-button-primary">حفظ</button></form>{% endblock %}
