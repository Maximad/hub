{% extends "base.html" %}
{% block content %}<h2>فعالية جديدة</h2>{% if error %}<p>{{ error }}</p>{% endif %}
<form method="post">{% csrf_token %}
<input name="title_ar" placeholder="الاسم" value="{{ form_data.title_ar|default:'' }}" required>
<input name="title_en" placeholder="الاسم EN" value="{{ form_data.title_en|default:'' }}">
<input type="datetime-local" name="starts_at" value="{{ form_data.starts_at|default:'' }}" required>
<input type="datetime-local" name="ends_at" value="{{ form_data.ends_at|default:'' }}">
<textarea name="description_ar" placeholder="الوصف">{{ form_data.description_ar|default:'' }}</textarea>
<select name="location_area"><option value="">بدون</option>{% for a in table_areas %}<option value="{{ a.id }}" {% if form_data.location_area == a.id|stringformat:'s' %}selected{% endif %}>{{ a.name_ar }}</option>{% endfor %}</select>
<input type="number" name="capacity" placeholder="السعة" value="{{ form_data.capacity|default:'' }}">
<select name="status">{% for v,l in statuses %}<option value="{{ v }}" {% if form_data.status == v %}selected{% endif %}>{{ l }}</option>{% endfor %}</select>
<button>حفظ</button></form>{% endblock %}
