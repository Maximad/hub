{% extends "base.html" %}
{% block content %}<h2>فعالية جديدة</h2>{% if error %}<p>{{ error }}</p>{% endif %}
<form method="post">{% csrf_token %}
<input name="title_ar" placeholder="الاسم" required>
<input name="title_en" placeholder="الاسم EN">
<input type="datetime-local" name="starts_at" required>
<input type="datetime-local" name="ends_at">
<textarea name="description_ar" placeholder="الوصف"></textarea>
<select name="location_area"><option value="">بدون</option>{% for a in table_areas %}<option value="{{ a.id }}">{{ a.name_ar }}</option>{% endfor %}</select>
<input type="number" name="capacity" placeholder="السعة">
<select name="status">{% for v,l in statuses %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select>
<button>حفظ</button></form>{% endblock %}
