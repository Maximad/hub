{% extends "staff/finance_base.html" %}{% block finance_content %}<h3>{% if purchase %}تعديل شراء{% else %}شراء جديد{% endif %}</h3>{% for e in errors %}<p class="hub-error">{{ e }}</p>{% endfor %}<form method="post">{% csrf_token %}<label>تاريخ العمل <input type="date" name="business_date" value="{{ purchase.business_date|default:today }}" required></label><label>المورد <select name="vendor"><option value="">—</option>{% for v in vendors %}<option value="{{ v.id }}" {% if purchase.vendor_id == v.id %}selected{% endif %}>{{ v }}</option>{% endfor %}</select></label><label>مورد نصي <input name="supplier_name" value="{{ purchase.supplier_name }}"></label><label>رقم الفاتورة <input name="invoice_number" value="{{ purchase.invoice_number }}"></label><label>تاريخ الفاتورة <input type="date" name="invoice_date" value="{{ purchase.invoice_date|date:'Y-m-d' }}"></label><label>الحالة <select name="status">{% for k,v in statuses %}<option value="{{ k }}" {% if purchase.status == k %}selected{% endif %}>{{ v }}</option>{% endfor %}</select></label><label>طريقة الدفع <select name="payment_method">{% for k,v in methods %}<option value="{{ k }}" {% if purchase.payment_method == k %}selected{% endif %}>{{ v }}</option>{% endfor %}</select></label><label>مدفوع من <select name="paid_from">{% for k,v in paid_froms %}<option value="{{ k }}" {% if purchase.paid_from == k %}selected{% endif %}>{{ v }}</option>{% endfor %}</select></label><label>المبلغ المدفوع <input type="number" min="0" step="0.01" name="amount_paid_syp" value="{{ purchase.amount_paid_syp|default:0 }}"></label><label>خصم <input type="number" min="0" step="0.01" name="discount_syp" value="{{ purchase.discount_syp|default:0 }}"></label><h4>البنود</h4>{% for n in '12345' %}<div class="hub-card"><select name="inventory_item"><option value="">مادة</option>{% for item in items %}<option value="{{ item.id }}">{{ item }}</option>{% endfor %}</select><input name="quantity" type="number" step="0.001" min="0" placeholder="كمية"><select name="unit">{% for k,v in units %}<option value="{{ k }}">{{ v }}</option>{% endfor %}</select><input name="unit_cost_syp" type="number" step="0.01" min="0" placeholder="كلفة الوحدة"></div>{% endfor %}<label>ملاحظات<textarea name="notes">{{ purchase.notes }}</textarea></label><button class="hub-btn" type="submit">حفظ</button></form>{% endblock %}
