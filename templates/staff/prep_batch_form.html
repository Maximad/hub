{% extends "base.html" %}{% block content %}<section class="hub-section"><h2>دفعة جديدة</h2><form method="post" class="hub-card">{% csrf_token %}<p><label>الاسم العربي <input name="batch_name_ar" required></label></p><p><label>تاريخ العمل <input type="date" name="business_date" value="{{ today|date:'Y-m-d' }}"></label></p><p><label>المنتج <select name="product"><option value="">—</option>{% for p in products %}<option value="{{ p.pk }}">{{ p.name_ar }}</option>{% endfor %}</select></label></p><p><label>النوع <select name="batch_type">{% for v,l in types %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></label></p><p><label>الكمية المخططة <input name="planned_quantity" type="number" step="0.001" value="0"></label> <label>الكمية المنتجة <input name="produced_quantity" type="number" step="0.001" value="0"></label></p><p><label>الوحدة <select name="unit">{% for v,l in units %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></label></p><p><label>مادة ناتجة <select name="output_inventory_item"><option value="">—</option>{% for i in items %}<option value="{{ i.pk }}">{{ i.name_ar }}</option>{% endfor %}</select></label> <label>كمية الناتج <input name="output_quantity" type="number" step="0.001" value="0"></label></p><p><label>ملاحظات <textarea name="notes"></textarea></label></p><button>حفظ</button></form></section>{% endblock %}
