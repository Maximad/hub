{% extends "staff/inventory_base.html" %}{% block inventory_content %}<form method="post">{% csrf_token %}<p><label>مادة مخزون <input name="name_ar" required></label></p><p><label>Name EN <input name="name_en"></label> <label>Code <input name="code"></label></p><p><label>نوع المادة <select name="item_type">{% for v,l in types %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></label> <label>وحدة القياس <select name="unit">{% for v,l in units %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></label></p><p><label>الكمية الحالية <input type="number" step="0.001" name="current_quantity" value="0"></label> <label>حد التنبيه <input type="number" step="0.001" name="low_stock_threshold"></label> <label>الكلفة التقديرية للوحدة <input type="number" step="0.01" name="estimated_unit_cost_syp"></label></p><p><label>المورد المفضل <select name="preferred_vendor"><option value="">—</option>{% for v in vendors %}<option value="{{ v.pk }}">{{ v }}</option>{% endfor %}</select></label></p><p><textarea name="notes" placeholder="ملاحظات"></textarea></p><button class="hub-button">حفظ</button></form>{% endblock %}
