{% extends "base.html" %}
{% block title %}إضافة اشتراك{% endblock %}
{% block content %}
<h2>إضافة اشتراك للعضو {{ member.name_ar }}</h2>
{% if error %}<p>{{ error }}</p>{% endif %}
<form method="post">{% csrf_token %}
<label>الخطة</label><select name="plan" required style="display:block; width:100%; margin-bottom:.5rem;">{% for p in plans %}<option value="{{ p.id }}" {% if form_data.plan == p.id|stringformat:'s' %}selected{% endif %}>{{ p.name_ar }} ({{ p.code }})</option>{% endfor %}</select>
<label>يبدأ في</label><input type="datetime-local" name="starts_at" value="{{ form_data.starts_at|default:'' }}" style="display:block; width:100%; margin-bottom:.5rem;">
<label>ينتهي في</label><input type="datetime-local" name="ends_at" value="{{ form_data.ends_at|default:'' }}" style="display:block; width:100%; margin-bottom:.5rem;">
<label>الدقائق المتبقية</label><input type="number" name="remaining_internet_minutes" value="{{ form_data.remaining_internet_minutes|default:'' }}" style="display:block; width:100%; margin-bottom:.5rem;">
<label>الرصيد المتبقي</label><input type="number" name="remaining_credit_syp" value="{{ form_data.remaining_credit_syp|default:'' }}" style="display:block; width:100%; margin-bottom:.5rem;">
<label>ملاحظات</label><textarea name="notes" style="display:block; width:100%; margin-bottom:.5rem;">{{ form_data.notes|default:'' }}</textarea>
<button type="submit">إنشاء الاشتراك</button>
</form>
{% endblock %}
