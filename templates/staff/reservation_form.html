{% extends "base.html" %}
{% block content %}<h2>حجز جديد</h2>{% if error %}<p>{{ error }}</p>{% endif %}
<form method="post">{% csrf_token %}
<input name="name" value="{{ form_data.name|default:'' }}" required placeholder="الاسم"><input name="phone" value="{{ form_data.phone|default:'' }}" required placeholder="الهاتف">
<input type="date" name="reservation_date" value="{{ form_data.reservation_date|default:'' }}" required><input type="time" name="start_time" value="{{ form_data.start_time|default:'' }}" required><input type="time" name="end_time" value="{{ form_data.end_time|default:'' }}">
<select name="reservation_type">{% for v,l in types %}<option value="{{ v }}" {% if form_data.reservation_type == v %}selected{% endif %}>{{ l }}</option>{% endfor %}</select>
<select name="status">{% for v,l in statuses %}<option value="{{ v }}" {% if form_data.status == v %}selected{% endif %}>{{ l }}</option>{% endfor %}</select>
<input type="number" name="party_size" value="{{ form_data.party_size|default:'1' }}">
<select name="table_area"><option value="">الطاولة/المساحة</option>{% for a in table_areas %}<option value="{{ a.id }}" {% if form_data.table_area == a.id|stringformat:'s' %}selected{% endif %}>{{ a.name_ar }}</option>{% endfor %}</select>
<select name="event"><option value="">فعالية (اختياري)</option>{% for e in events %}<option value="{{ e.id }}" {% if form_data.event == e.id|stringformat:'s' %}selected{% endif %}>{{ e.title_ar }}</option>{% endfor %}</select>
<textarea name="notes" placeholder="ملاحظات">{{ form_data.notes|default:'' }}</textarea><button>حفظ</button></form>{% endblock %}
