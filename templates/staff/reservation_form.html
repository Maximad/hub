{% extends "base.html" %}
{% block content %}<h2>حجز جديد</h2>{% if error %}<p>{{ error }}</p>{% endif %}
<form method="post">{% csrf_token %}
<input name="name" required placeholder="الاسم"><input name="phone" required placeholder="الهاتف">
<input type="date" name="reservation_date" required><input type="time" name="start_time" required><input type="time" name="end_time">
<select name="reservation_type">{% for v,l in types %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select>
<select name="status">{% for v,l in statuses %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select>
<input type="number" name="party_size" value="1">
<select name="table_area"><option value="">الطاولة/المساحة</option>{% for a in table_areas %}<option value="{{ a.id }}">{{ a.name_ar }}</option>{% endfor %}</select>
<select name="event"><option value="">فعالية (اختياري)</option>{% for e in events %}<option value="{{ e.id }}">{{ e.title_ar }}</option>{% endfor %}</select>
<textarea name="notes" placeholder="ملاحظات"></textarea><button>حفظ</button></form>{% endblock %}
