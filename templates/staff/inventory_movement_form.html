{% extends "staff/inventory_base.html" %}{% block inventory_content %}<form method="post">{% csrf_token %}<p><label>التاريخ <input type="date" name="business_date" value="{{ today|date:'Y-m-d' }}"></label> <label>المادة <select name="inventory_item">{% for i in items %}<option value="{{ i.pk }}">{{ i }}</option>{% endfor %}</select></label></p><p><label>نوع الحركة <select name="movement_type">{% for v,l in types %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></label> <label>الاتجاه <select name="direction">{% for v,l in directions %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></label> <label>الكمية <input type="number" step="0.001" name="quantity" required></label></p><p><textarea name="reason" placeholder="سبب الحركة"></textarea></p><button class="hub-button">حفظ</button></form>{% endblock %}
