services:
  db:
    image: postgres:16
    container_name: hub-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hub}
      POSTGRES_USER: ${POSTGRES_USER:-hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hub}
    volumes:
      - hub_db_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: hub-web
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "127.0.0.1:8899:8000"

volumes:
  hub_db_data:
